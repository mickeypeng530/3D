<script type="module">
import * as THREE from "three";
import { RoundedBoxGeometry } from "three/addons/geometries/RoundedBoxGeometry.js";
import { positionGeometry, positionWorld, normalWorld, color, mix, step, float, abs, uniform, vec4, smoothstep, max, sin, floor as tslFloor } from "three/tsl";
import { World, Man, scene, camera, renderer, controls, ground, light, cameraLight } from "disfigure";

/* ============================================================
   World(disfigure 自帶 scene/camera/renderer/controls)
   ============================================================ */
new World();
if (ground) ground.visible = false;
scene.background = new THREE.Color(0xc3ccd5);
const ambient = new THREE.AmbientLight(0xffffff, 0.5);   // disfigure 預設無環境光
scene.add(ambient);

function fitViewport() {
  renderer.setSize(window.innerWidth || 1280, window.innerHeight || 720);
  camera.aspect = (window.innerWidth || 1280) / (window.innerHeight || 720);
  camera.updateProjectionMatrix();
}
fitViewport();
setTimeout(fitViewport, 300);

const GL = 0;   // disfigure 原生公尺單位,地面 y=0

const figure = new Man(1.73);
figure.frustumCulled = false;   // GPU 變形不更新 bounds

// ============================================================
// 人偶表面著色(TSL colorNode):衣服 + 雷射線 + 光野十字「畫在皮膚上」
// 任何視角都貼著身體輪廓(真正在表面),取代會浮空的貼片做法
// ============================================================
const uSleeveFront = uniform(0.35);   // 袖長:前側(+z anterior)外緣 |x| 截斷(越小越短)
const uSleeveBack = uniform(0.39);    // 袖長:後側(-z posterior)外緣 |x| 截斷
const uBeamInv = uniform(new THREE.Matrix4());   // 世界 -> 光束局部(束軸 -Y)
const uRoomInv = uniform(new THREE.Matrix4());   // 世界 -> 房間座標
const uFocalR = uniform(new THREE.Vector3(0, 2, 0));   // 焦點(房間座標)
const uOcclC = uniform(new THREE.Vector3(0, 0, 0));    // 身體遮擋橢球中心(房間座標)
const uOcclR = uniform(new THREE.Vector3(1, 1, 1));    // 橢球半徑
const uOcclOn = uniform(0);
const uSurfaceField = uniform(1);   // 承光面是否顯示光野(0 = 只畫在人偶身上,檯面乾淨)
const uFieldW = uniform(0.24);
const uFieldH = uniform(0.30);
const uBeamLen = uniform(1.0);
const uCrossOn = uniform(1);
const uShowCross = uniform(1);   // 0 = 只留柔光罩、不畫十字陰影(示意圖風格)
const uPaintGateOn = uniform(0);                       // 1 = 光野/十字只畫在 uPaintC 附近(排除手臂等)
const uPaintC = uniform(new THREE.Vector3(0, 0, 0));   // 限定著色的世界中心(如頸部 C7-T1)
const uPaintR = uniform(0.15);
// 光野著色工廠:依 Skull AP 實拍 — 柔邊矩形暖光 + 中央寬軟邊十字陰影
// 套用在任何材質的 colorNode 上(人偶皮膚 + 牆/板/檯面),取代圓形 spotlight 光池
function beamPaint(base, onSurface) {
  const posB = uBeamInv.mul(vec4(positionWorld, 1)).xyz;   // 光束局部(束軸 -Y)
  const d = posB.y.negate();
  const nearFade = smoothstep(float(0.05), float(0.15), d);
  const farFade = smoothstep(uBeamLen.add(0.03), uBeamLen.add(0.30), d).oneMinus();
  const halfW = uFieldW.mul(0.5).mul(d).div(uBeamLen);
  const halfH = uFieldH.mul(0.5).mul(d).div(uBeamLen);
  const inX = smoothstep(halfW.sub(0.015), halfW, abs(posB.x)).oneMinus();
  const inZ = smoothstep(halfH.sub(0.015), halfH, abs(posB.z)).oneMinus();
  const fieldMask = nearFade.mul(farFade).mul(inX).mul(inZ).mul(uCrossOn);
  // 寬約 15mm 的軟邊十字陰影帶
  const crossX = smoothstep(float(0.004), float(0.011), abs(posB.x)).oneMinus();
  const crossZ = smoothstep(float(0.004), float(0.011), abs(posB.z)).oneMinus();
  const crossBand = max(crossX, crossZ);

  // 身體遮擋:焦點->表面點 的射線若穿過身體橢球 = 在身體影子裡,不畫光野
  // (橢球座標正規化後解二次式;表面點本身在橢球內 = 身體自己,照常畫)
  const posR = uRoomInv.mul(vec4(positionWorld, 1)).xyz;
  const o = uFocalR.sub(uOcclC).div(uOcclR);
  const dv = posR.sub(uFocalR).div(uOcclR);
  const qA = dv.dot(dv);
  const qB = o.dot(dv).mul(2);
  const qC = o.dot(o).sub(1);
  const disc = qB.mul(qB).sub(qA.mul(qC).mul(4));
  const sq = disc.max(0).sqrt();
  const t0 = qB.negate().sub(sq).div(qA.mul(2));
  const t1 = qB.negate().add(sq).div(qA.mul(2));
  const hit = step(float(0.0001), disc).mul(step(t0, float(0.97))).mul(step(float(0.03), t1));
  const pp = posR.sub(uOcclC).div(uOcclR);
  const isBody = step(pp.dot(pp), float(1.15));
  const lit = hit.mul(isBody.oneMinus()).mul(uOcclOn).oneMinus();

  // 承光面(檯/牆/板)可整體關閉光野(uSurfaceField=0 -> 光野只畫在人偶身上)
  const surfGate = onSurface ? uSurfaceField : float(1);
  // 範圍閘:小球內 + 只在「朝向球管的正面」著色(背面=左手/左脖子本來就照不到,不該有十字)
  const pgd = positionWorld.sub(uPaintC).length();
  const toFocal = uFocalR.sub(posR).normalize();
  // 只擋「真正朝板(背側,dot≈-1,如左手/左脖子)」的面;放行朝側/朝後(耳後 dot≈0)的面
  const facing = smoothstep(float(-0.4), float(-0.1), normalWorld.dot(toFocal));
  const gateVal = smoothstep(uPaintR.add(0.04), uPaintR.sub(0.02), pgd).mul(facing);
  const paintGate = mix(float(1), gateVal, uPaintGateOn);
  const fm = fieldMask.mul(lit).mul(surfGate).mul(paintGate);
  // 光野:乘法提亮(保留布料/皮膚色相,不被白光沖淡)+ 極淡暖色調
  let c = base.mul(fm.mul(0.5).add(1));                  // 最多 1.5x 亮度
  c = c.mul(mix(color("#ffffff"), color("#ffe6b0"), fm.mul(0.5)));  // 微暖
  c = mix(c, c.mul(0.45), fm.mul(crossBand).mul(uShowCross));   // 十字陰影帶(可關)
  return c;
}

{
  // 病人服(著色法升級):淺藍布 + 圓領口 + 短袖肩 + 點點花紋
  // 模型空間 y 0~1.785、x 左右、z 前後(胸在 +z)
  const y = positionGeometry.y, x = positionGeometry.x, z = positionGeometry.z;
  // 上衣:胸腹段,柔邊;圓領口 = 前胸高處挖一個圓(高 y + 前 z + 近中線)
  const torsoBand = smoothstep(float(0.70), float(0.80), y).mul(smoothstep(float(1.60), float(1.52), y));  // 下緣降到與短褲相接(腰部不露膚)、上緣升到肩
  const sideIn = smoothstep(float(0.34), float(0.28), abs(x));                 // 加寬到含肩
  // 圓領口:高 y + 前 z + 近中線 三者皆成立處挖空(露出胸前皮膚)
  const openY = smoothstep(float(1.48), float(1.56), y);   // 領口提高:只在喉部開,胸口蓋住
  const openZ = smoothstep(float(0.0), float(0.06), z);
  const openX = smoothstep(float(0.13), float(0.07), abs(x));
  const neckline = openY.mul(openZ).mul(openX).oneMinus();
  let top = torsoBand.mul(sideIn).mul(neckline);
  // 短袖:rest pose 為 T-pose,手臂沿 ±X;從肩(|x|≈0.26)蓋到近端前臂(|x|≈0.52),並包住手臂 y/z
  // ⚠️ 手臂 rest 中心線實測在 (y≈1.46, z≈-0.08),且手臂 z 全為負(-0.14~-0.03)。
  // 圓管中心與前後分界都要以 z=-0.08 為基準,否則只罩到前緣、前後分界錯位。
  const dy = y.sub(1.46), dz = z.add(0.08);
  const armR2 = dy.mul(dy).add(dz.mul(dz));
  const armTube = smoothstep(float(0.016), float(0.008), armR2);   // 圓管罩住整個手臂截面
  // 袖長前/後各自可調(uniform)。zFrac 以 -0.08 為中心:0=後(更負 z)1=前(近 -0.04)
  const zFrac = smoothstep(float(-0.12), float(-0.04), z);
  const sleeveOuter = mix(uSleeveBack, uSleeveFront, zFrac);
  const armX = smoothstep(float(0.26), float(0.30), abs(x)).mul(smoothstep(sleeveOuter, sleeveOuter.sub(float(0.04)), abs(x)));
  const sleeve = armX.mul(armTube);
  // 短褲:髖段全寬
  const shorts = smoothstep(float(0.66), float(0.70), y).mul(smoothstep(float(1.08), float(1.02), y));
  const clothMask = top.add(sleeve).add(shorts).min(1);
  // 點點花紋(病人服):模型空間網格點,布上才顯現
  const dots = sin(x.mul(95)).mul(sin(y.mul(95))).mul(sin(z.mul(95)));
  const dotMask = smoothstep(float(0.5), float(0.85), dots).mul(clothMask).mul(0.10);
  const gown = color("#7791ba");                       // 中深藍病人服
  let c = mix(color("#c9b29a"), gown, clothMask);   // 膚色偏暖(淺咖啡)
  c = mix(c, color("#5d77a2"), dotMask);               // 點點略深

  // 光野 + 十字(畫在皮膚上)
  c = beamPaint(c);

  figure.material.colorNode = c;
  // 自發光:人偶變形綁在材質內不能換,且不吃場景燈(尤其俯臥/側臥背光面全黑)。
  // 用 emissiveNode 給一個與朝向相關的自照亮,任何體位都看得見、又不死板。
  const Ldir = new THREE.Vector3(0.3, 0.85, 0.45).normalize();
  const ndl = normalWorld.dot(uniform(Ldir)).mul(0.5).add(0.5);   // wrap diffuse 0~1
  const shade = ndl.mul(0.5).add(0.42);                            // 0.42~0.92
  figure.material.emissiveNode = c.mul(shade);
  figure.material.needsUpdate = true;
}

/* ============================================================
   「人不動,轉房間」架構:
   disfigure 在人偶根部大旋轉時關節軸錯亂(臥位翻車),所以人偶永遠站立,
   臥位 view 改成把整個房間(ROOMG)旋轉 90 度 + 攝影機 up 軸跟著轉,
   圖面上人就「躺」在檯上,而關節保持站立語意 100% 正常。
   LIE_M:room x->world -y(體軸沿檯)、room y->world +z(檯面法線=肚皮朝向)
   ============================================================ */
const ROOMG = new THREE.Group();
scene.add(ROOMG);
const LIE_M = new THREE.Matrix4().makeBasis(
  new THREE.Vector3(0, -1, 0),
  new THREE.Vector3(0, 0, 1),
  new THREE.Vector3(-1, 0, 0)
);

// 房間內自帶主光(隨房間旋轉,讓臥位圖的光影方向仍然「從上方來」)
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(0, 12, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -4; sun.shadow.camera.right = 4;
sun.shadow.camera.top = 4; sun.shadow.camera.bottom = -4;
ROOMG.add(sun);
ROOMG.add(sun.target);
if (light) light.intensity = 0.25;   // 壓低 disfigure 的世界座標主光
if (cameraLight) cameraLight.intensity = 0.5;   // 相機跟隨光壓低(預設 1.4 會在板面打出圓形亮斑)

/* ============================================================
   材質與幾何 helper
   ============================================================ */
// 承光面(牆/板/檯)用 node material,光野矩形 + 十字直接畫上去
function beamLambert(hex) {
  const m = new THREE.MeshLambertNodeMaterial();
  m.colorNode = beamPaint(color(hex), true);
  return m;
}
const mat = {
  floor:  beamLambert("#a9b5bf"),
  wall:   beamLambert("#d4dbe1"),
  metal:  new THREE.MeshLambertMaterial({ color: 0x9ba5af }),
  dark:   new THREE.MeshLambertMaterial({ color: 0x3f4854 }),
  panel:  beamLambert("#f2f4f6"),
  active: beamLambert("#fafcfe"),
  table:  beamLambert("#e6ebef"),
  beam:   new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.07, side: THREE.FrontSide, depthWrite: false })   // 單面+低不透明度:避免多層疊成白盤
};

function box(w, h, d, m, x, y, z, parent) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
  mesh.position.set(x, GL + y, z);
  mesh.castShadow = mesh.receiveShadow = true;
  (parent || ROOMG).add(mesh);
  return mesh;
}
function rbox(w, h, d, r, m, x, y, z, parent) {
  const mesh = new THREE.Mesh(new RoundedBoxGeometry(w, h, d, 4, r), m);
  mesh.position.set(x, GL + y, z);
  mesh.castShadow = mesh.receiveShadow = true;
  (parent || ROOMG).add(mesh);
  return mesh;
}

/* ============================================================
   房間
   ============================================================ */
const ROOM = { backZ: -1.9, leftX: -2.2, w: 4.6, d: 4.0, h: 2.9 };
{
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.d), mat.floor);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(ROOM.leftX + ROOM.w / 2, GL + 0.001, ROOM.backZ + ROOM.d / 2);
  floor.receiveShadow = true;
  ROOMG.add(floor);
  const back = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.h), mat.wall);
  back.position.set(ROOM.leftX + ROOM.w / 2, GL + ROOM.h / 2, ROOM.backZ);
  back.receiveShadow = true;
  ROOMG.add(back);
  const left = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.d, ROOM.h), mat.wall);
  left.rotation.y = Math.PI / 2;
  left.position.set(ROOM.leftX, GL + ROOM.h / 2, ROOM.backZ + ROOM.d / 2);
  left.receiveShadow = true;
  ROOMG.add(left);
}

/* ============================================================
   壁架(單柱 + 深色內軌 + 圓角白匣)
   ============================================================ */
const WS = { x: -0.9, faceZ: ROOM.backZ + 0.24 };   // x = 建模基準,實際位置由 S.ws.x 平移
const wsAll = new THREE.Group();
ROOMG.add(wsAll);
{
  rbox(0.30, ROOM.h, 0.13, 0.02, mat.metal, WS.x, ROOM.h / 2, ROOM.backZ + 0.075, wsAll);
  box(0.10, ROOM.h - 0.04, 0.012, mat.dark, WS.x, ROOM.h / 2, ROOM.backZ + 0.142, wsAll);
}
const wsCarriage = new THREE.Group();
wsAll.add(wsCarriage);
{
  rbox(0.15, 0.24, 0.12, 0.02, mat.metal, WS.x, 1.45, ROOM.backZ + 0.165, wsCarriage);
  rbox(0.62, 0.66, 0.09, 0.03, mat.panel, WS.x, 1.45, ROOM.backZ + 0.19, wsCarriage);
  const frame = box(0.50, 0.56, 0.006, beamLambert("#d9dee4"), WS.x, 1.45, WS.faceZ - 0.004, wsCarriage);
  frame.castShadow = false;
  const act = box(0.35, 0.43, 0.012, mat.active, WS.x, 1.45, WS.faceZ, wsCarriage);
  act.castShadow = false;
  act.receiveShadow = true;
}


/* ============================================================
   攝影檯 + 檯面偵檢板
   ============================================================ */
const TBL = { cx: 0.75, cz: 0.55, topY: 0.74, w: 2.2, d: 0.8 };
rbox(1.35, TBL.topY - 0.10, 0.60, 0.02, mat.metal, TBL.cx, (TBL.topY - 0.10) / 2 + 0.01, TBL.cz);
rbox(TBL.w, 0.07, TBL.d, 0.025, mat.table, TBL.cx, TBL.topY - 0.035, TBL.cz);
const tblDet = new THREE.Group();
ROOMG.add(tblDet);
{

function rebuildBeam(fieldW, fieldH, len) {
  const a = 0.02, W = fieldW / 2, H = fieldH / 2, L = len;
  const v = [
    [-a, 0, -a], [a, 0, -a], [a, 0, a], [-a, 0, a],
    [-W, -L, -H], [W, -L, -H], [W, -L, H], [-W, -L, H]
  ];
  const idx = [0,4,5, 0,5,1,  1,5,6, 1,6,2,  2,6,7, 2,7,3,  3,7,4, 3,4,0,  4,6,5, 4,7,6];
  const pos = new Float32Array(idx.length * 3);
  idx.forEach((vi, i) => { pos[i*3] = v[vi][0]; pos[i*3+1] = v[vi][1]; pos[i*3+2] = v[vi][2]; });
  beamMesh.geometry.dispose();
  beamMesh.geometry = new THREE.BufferGeometry();
  beamMesh.geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  spot.angle = Math.min(1.2, Math.atan(Math.max(W, H) / L) * 1.15 + 0.02);
  spotTarget.position.set(0, -L, 0);
}

/* ============================================================
   套用狀態
   ============================================================ */
function applyAll() {
  figure.position.set(S.fig.x, GL + S.fig.y, S.fig.z);
  // 旋轉必須下在 figure 本體(parent Group 會被變形 shader 忽略);大角度根旋轉會翻轉部分關節軸語意(HANDOVER)
  // -> 臥位一律改用 S.room.lie 轉房間,figure 的 rotZ 僅留微調用
  figure.rotation.set(0, THREE.MathUtils.degToRad(S.fig.rotY), THREE.MathUtils.degToRad(S.fig.rotZ || 0));

  // 房間姿態
  if (S.room.lie) {
    ROOMG.quaternion.setFromRotationMatrix(LIE_M);
    ROOMG.position.set(S.room.ox, S.room.oy, S.room.oz);
  } else {
    ROOMG.quaternion.identity();
    ROOMG.position.set(0, 0, 0);
  }
  ROOMG.updateMatrixWorld(true);

  wsAll.position.x = (S.ws.x === undefined ? -0.9 : S.ws.x) + 0.9;
  wsCarriage.position.y = S.ws.h - 1.45;
  tblDet.visible = !!S.det.on;
  tblDet.position.set(S.det.x, 0, S.det.z);

  tubeRig.position.set(S.tube.x, 0, S.tube.z);
  tubeRig.rotation.y = THREE.MathUtils.degToRad(S.tube.yaw);
  tubeHead.position.y = GL + S.tube.h;
  tubeHead.rotation.x = THREE.MathUtils.degToRad(S.tube.pitch);   // 控制光束(beamGroup 在此群組內)
  // 機身視覺傾斜(bodyTilt 相對 tubeHead;與光束解耦,只動外觀)
  tubeBody.rotation.x = THREE.MathUtils.degToRad(S.tube.bodyTilt || 0);
  yoke.position.y = GL + S.tube.h + 0.135;
  const colLen = ROOM.h - 0.1 - S.tube.h;
  column.scale.y = colLen;
  column.position.y = GL + S.tube.h + colLen / 2;

  // SID:焦點至壁架板 / 檯面偵檢板 / 檯面 — 全部在「房間座標」解析計算
  // (房間可能整體旋轉,設備相對幾何不變,用 S 的數值算最穩)
  const eul = new THREE.Euler(THREE.MathUtils.degToRad(S.tube.pitch), THREE.MathUtils.degToRad(S.tube.yaw), 0, "YXZ");
  const dir = new THREE.Vector3(0, -1, 0).applyEuler(eul);
  const focal = new THREE.Vector3(S.tube.x, GL + S.tube.h, S.tube.z);
  // 陰影光源:beamShadow 開時對齊光束方向(水平),使板上陰影為水平投影
  //   → 頭影在頭高、舉起的手影在手高(投到板頂以上),符合近水平 X 光束;否則用預設斜上光
  if (S.beamShadow) {
    sun.position.copy(focal).addScaledVector(dir, -8);
    sun.target.position.copy(focal).addScaledVector(dir, 8);
  } else {
    sun.position.set(0, 12, 6);
    sun.target.position.set(0, 0, 0);
  }
  sun.target.updateMatrixWorld();
  let L = 1.2, sidTxt = "-", hitWhat = "壁架板";
  const cands = [];
  if (Math.abs(dir.z) > 0.05) {
    const t = (WS.faceZ - focal.z) / dir.z;
    if (t > 0.3) cands.push({ t, what: "壁架板" });
  }
  if (Math.abs(dir.y) > 0.05) {
    const planeY = GL + (S.det.on ? TBL.topY + 0.02 : TBL.topY);
    const t = (planeY - focal.y) / dir.y;
    if (t > 0.3) cands.push({ t, what: S.det.on ? "檯面偵檢板" : "檯面" });
  }
  if (cands.length) {
    const hit = cands.reduce((a, b) => (a.t < b.t ? a : b));
    const sid = hit.t;
    hitWhat = hit.what;
    L = Math.max(0.1, sid - 0.27);
    sidTxt = `${Math.round(sid * 100)} cm(至${hit.what})`;
  }
  // CR 角度顯示:相對偵檢板法線的偏角 +(視覺機身斜,給用假斜的 preset)
  //   立式板(壁架)法線=水平 → 偏角 = 90 - pitch;檯面法線=垂直 → 偏角 = pitch
  const perpDev = (hitWhat === "壁架板") ? (90 - S.tube.pitch) : S.tube.pitch;
  const crDeg = Math.round(perpDev + (S.tube.bodyTilt || 0));
  beamGroup.visible = !!S.tube.beamOn;
  if (S.tube.beamOn) rebuildBeam(S.tube.fieldW, S.tube.fieldH, L);

  // 表面著色 uniform:光束逆矩陣(十字/光野畫在表面,任何視角正確)
  uFieldW.value = S.tube.fieldW;
  uFieldH.value = S.tube.fieldH;
  uBeamLen.value = L;
  uCrossOn.value = S.tube.beamOn ? 1 : 0;
  uShowCross.value = (S.showCross === 0) ? 0 : 1;
  uSurfaceField.value = (S.surfaceField === 0) ? 0 : 1;   // 0 = 光野只畫在人偶身上,檯面乾淨
  if (S.paintGate) {   // 限定著色範圍:中心跟著光束(球管 x/高),深度 z 與半徑可調
    const pg = S.paintGate;
    uPaintGateOn.value = 1;
    uPaintC.value.set(S.tube.x, GL + S.tube.h, pg.z);
    uPaintR.value = pg.r;
  } else {
    uPaintGateOn.value = 0;
  }
  beamGroup.updateWorldMatrix(true, false);
  uBeamInv.value.copy(beamGroup.matrixWorld).invert();
  // 身體遮擋橢球(房間座標)
  uRoomInv.value.copy(ROOMG.matrixWorld).invert();
  uFocalR.value.set(S.tube.x, GL + S.tube.h, S.tube.z);
  if (S.occl) {
    uOcclOn.value = 1;
    uOcclC.value.set(S.occl.x, S.occl.y, S.occl.z);
    uOcclR.value.set(S.occl.rx, S.occl.ry, S.occl.rz);
  } else {
    uOcclOn.value = 0;
  }

  if (figure.update) figure.update();

  document.getElementById("readout").innerHTML =
    `SID:<b>${sidTxt}</b><br>` +
    `球管:高 <b>${(S.tube.h).toFixed(2)} m</b>,CR 傾角 <b>${crDeg}&deg;</b>,旋轉 <b>${S.tube.yaw}&deg;</b><br>` +
    `光野:<b>${Math.round(S.tube.fieldW * 100)} x ${Math.round(S.tube.fieldH * 100)} cm</b>`;
}

    tube: { x: -0.12, z: 0.57, h: 1.74, pitch: 0, bodyTilt: 12, yaw: 0, fieldW: 0.20, fieldH: 0.19, beamOn: 1 },  // 8x10吋;機身視覺斜 12°,光束垂直

function applyPreset(key) {
  const p = PRESETS[key];
  if (!p) return;
  Object.assign(S.fig, p.fig);
  S.tube.bodyTilt = 0;   // 預設歸零(preset 沒指定就不殘留上一個的視覺斜)
  Object.assign(S.tube, p.tube);
  Object.assign(S.ws, p.ws);
  Object.assign(S.det, p.det);
  S.room = p.room ? { ...p.room } : { lie: 0, ox: 0, oy: 0, oz: 0 };
  S.occl = p.occl ? { ...p.occl } : null;
  S.surfaceField = (p.surfaceField === undefined) ? 1 : p.surfaceField;
  S.showCross = (p.showCross === undefined) ? 1 : p.showCross;
  S.paintGate = p.paintGate ? { ...p.paintGate } : null;   // 範圍閘(只在頸部畫)
  S.beamShadow = p.beamShadow || 0;                        // 陰影對齊光束
  resetPose();
  for (const [path, v] of Object.entries(p.joints || {})) setJoint(path, v);
  applyAll();
  syncSliders();
  if (p.cam) {
    // 相機 preset 一律用「房間座標」描述,轉成世界座標;臥位時 up 軸跟著房間轉
    const cp = new THREE.Vector3(p.cam.px, GL + p.cam.py, p.cam.pz);
    const ct = new THREE.Vector3(p.cam.tx, GL + p.cam.ty, p.cam.tz);
    ROOMG.updateMatrixWorld(true);
    ROOMG.localToWorld(cp);
    ROOMG.localToWorld(ct);
    camera.up.set(0, S.room.lie ? 0 : 1, S.room.lie ? 1 : 0);
    camera.position.copy(cp);
    controls.target.copy(ct);
    controls.update();
    camS.height = 0; camHApplied = 0;   // preset 重設高度基準
    readCamAngles();
    syncSliders();
  }
}

/* ============================================================
   UI
   ============================================================ */
const groupsDiv = document.getElementById("groups");
const sliderRegistry = [];

function addSlider(parent, label, min, max, step, get, set) {
  const row = document.createElement("div");
  row.className = "row";
  const lab = document.createElement("label");
  lab.textContent = label;
  lab.title = label;
  const input = document.createElement("input");
  input.type = "range"; input.min = min; input.max = max; input.step = step;
  input.value = get();
  // 數值欄可直接鍵盤輸入(Enter 或失焦套用)
  const val = document.createElement("input");
  val.type = "number"; val.className = "val";
  val.min = min; val.max = max; val.step = step;
  val.value = (+get()).toFixed(step < 1 ? 2 : 0);
  input.addEventListener("input", () => {
    const v = +input.value;
    set(v);
    val.value = v.toFixed(step < 1 ? 2 : 0);
    applyAll();
  });
  val.addEventListener("change", () => {
    let v = parseFloat(val.value);
    if (isNaN(v)) v = get();
    v = Math.min(max, Math.max(min, v));
    set(v);
    input.value = v;
    val.value = v.toFixed(step < 1 ? 2 : 0);
    applyAll();
  });
  row.append(lab, input, val);
  parent.appendChild(row);
  sliderRegistry.push({ get, input, val, step });
}

function addGroup(title, open) {
  const det = document.createElement("details");
  if (open) det.open = true;
  const sum = document.createElement("summary");
  sum.textContent = title;
  det.appendChild(sum);
  groupsDiv.appendChild(det);
  return det;
}

function syncSliders() {
  for (const s of sliderRegistry) {
    const v = +s.get();
    s.input.value = v;
    if (document.activeElement !== s.val) s.val.value = v.toFixed(s.step < 1 ? 2 : 0);
  }
}

// 視角精準控制(以 controls.target 為中心的球面角,房間座標 -> 臥位場景也正確)
const camS = { az: 35, el: 25, dist: 3, height: 0, eye: 1.6 };
let camHApplied = 0;   // 已套用的取景升降位移(world Y),供 delta 平移
// 取景升降 = 沿 world +Y 平移(相機與焦點同步移,角度不變);臥/站皆正確
function applyCamHeight() {
  const dy = camS.height - camHApplied;
  controls.target.y += dy;
  camera.position.y += dy;
  camHApplied = camS.height;
  controls.update();
  readCamAngles();
}
// 鏡頭離地高 = 只移相機本身(焦點不動),拉高更俯視
function applyEyeHeight() {
  camera.position.y = GL + camS.eye;
  controls.update();
  readCamAngles();
}
function applyCamAngles() {
  const azR = THREE.MathUtils.degToRad(camS.az), elR = THREE.MathUtils.degToRad(camS.el);
  const v = new THREE.Vector3(
    Math.sin(azR) * Math.cos(elR),
    Math.sin(elR),
    Math.cos(azR) * Math.cos(elR)
  ).applyQuaternion(ROOMG.quaternion);
  camera.position.copy(controls.target).addScaledVector(v, camS.dist);
  camera.up.copy(roomDir(0, 1, 0));
  controls.update();
}
function readCamAngles() {
  const inv = ROOMG.quaternion.clone().invert();
  const v = camera.position.clone().sub(controls.target).applyQuaternion(inv);
  camS.dist = Math.max(0.3, v.length());
  camS.el = THREE.MathUtils.radToDeg(Math.asin(THREE.MathUtils.clamp(v.y / camS.dist, -1, 1)));
  camS.az = THREE.MathUtils.radToDeg(Math.atan2(v.x, v.z));
  camS.eye = camera.position.y - GL;
}
{
  const g = addGroup("視角(可精準調)", true);
  addSlider(g, "水平角", -180, 180, 1, () => camS.az, v => { camS.az = v; applyCamAngles(); });
  addSlider(g, "垂直角", -10, 89, 1, () => camS.el, v => { camS.el = v; applyCamAngles(); });
  addSlider(g, "距離 (m)", 0.6, 5, 0.05, () => camS.dist, v => { camS.dist = v; applyCamAngles(); });
  addSlider(g, "取景升降 (m)", -1.2, 1.2, 0.02, () => camS.height, v => { camS.height = v; applyCamHeight(); });

}

/* ============================================================
   Preset 下拉 + 按鈕
   ============================================================ */
const presetSel = document.getElementById("presetSel");
for (const [k, p] of Object.entries(PRESETS)) {
  const opt = document.createElement("option");
  opt.value = k; opt.textContent = p.label;
  presetSel.appendChild(opt);
}
presetSel.addEventListener("change", () => applyPreset(presetSel.value));

// 標準視角(以目前 controls.target 為中心,方向用「房間座標」算 -> 臥位場景也正確)
const VIEW_DIRS = {
  oblique: [0.8, 0.55, 0.8],
  front:   [0, 0.18, 1],
  side:    [1, 0.18, 0.001],
  top:     [0.45, 1, 0.45]   // 純正上方會被球管擋住,略偏斜
};
function roomDir(x, y, z) {
  return new THREE.Vector3(x, y, z).normalize().applyQuaternion(ROOMG.quaternion);
}
function setView(kind) {
  const d = VIEW_DIRS[kind];
  const t = controls.target.clone();
  const dist = Math.max(1.2, camera.position.distanceTo(t));
  const dir = roomDir(d[0], d[1], d[2]);
  camera.position.copy(t).addScaledVector(dir, dist);
  // 正上方視角時 up 不能與視線平行,改用房間 -z 當畫面上方;其他視角用房間 +y
  camera.up.copy(kind === "top" ? roomDir(0, 0, -1) : roomDir(0, 1, 0));
  controls.update();
  readCamAngles();
  syncSliders();
}
document.querySelectorAll("#panel button[data-view]").forEach(b =>
  b.addEventListener("click", () => setView(b.dataset.view)));

// 滑鼠手動旋轉後,讓視角滑桿同步當前角度
controls.addEventListener("change", () => { readCamAngles(); syncSliders(); });

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 1800);
}

async function renderOnce() {
  if (renderer.renderAsync) await renderer.renderAsync(scene, camera);
  else renderer.render(scene, camera);
}

document.getElementById("btnShot").addEventListener("click", async () => {
  await renderOnce();
  renderer.domElement.toBlob(b => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `${presetSel.value}_3d.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
  toast("已下載截圖");
});

let whiteBg = false;
document.getElementById("btnBg").addEventListener("click", () => {
  whiteBg = !whiteBg;
  scene.background = new THREE.Color(whiteBg ? 0xffffff : 0xc3ccd5);
});

document.getElementById("btnExport").addEventListener("click", () => {
  const joints = {};
  for (const p of ALL_PATHS) joints[p] = getJoint(p);
  const data = { preset: presetSel.value, S, joints };
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
  a.download = `${presetSel.value}_settings.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已匯出設定 JSON");
});

document.getElementById("btnImport").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  f.text().then(txt => {
    try {
      const data = JSON.parse(txt);
      if (data.S) {
        Object.assign(S.fig, data.S.fig); Object.assign(S.tube, data.S.tube);
        Object.assign(S.ws, data.S.ws); Object.assign(S.det, data.S.det);
        if (data.S.room) S.room = data.S.room;
      }
      if (data.joints) for (const [p, v] of Object.entries(data.joints)) setJoint(p, v);
      applyAll(); syncSliders();
      toast("已匯入設定");
    } catch (err) { toast("匯入失敗:" + err.message); }
  });
  e.target.value = "";
});

/* ============================================================
   啟動
   ============================================================ */
applyPreset("cspine-lateral");
presetSel.value = "cspine-lateral";
window.__setStatus("");

window.__sim = { THREE, S, PRESETS, figure, scene, camera, renderer, controls, applyAll, applyPreset, setJoint, getJoint, resetPose, syncSliders, renderOnce, ROOMG, camS, applyCamAngles, readCamAngles, setView, uSleeveFront, uSleeveBack };
