<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>X光擺位 3D 模擬器</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; font-family:"Segoe UI","Microsoft JhengHei",sans-serif; }
  canvas { display:block; }

  #panel {
    position:fixed; top:0; right:0; width:330px; max-height:100vh; overflow-y:auto;
    background:rgba(24,28,36,.92); color:#e6e9ef; font-size:13px;
    padding:10px 12px 24px; box-sizing:border-box; z-index:10;
  }
  #panel h1 { font-size:15px; margin:2px 0 8px; color:#7fd1ff; }
  #panel .hint { color:#9aa3b2; font-size:11px; margin:4px 0 8px; line-height:1.5; }
  select, button {
    background:#2b3242; color:#e6e9ef; border:1px solid #495066; border-radius:6px;
    padding:5px 8px; font-size:13px; cursor:pointer;
  }
  select { width:100%; margin-bottom:6px; }
  button:hover { background:#3a4358; }
  .btnrow { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 10px; }
  .btnrow button { flex:1 1 auto; }
  details { border:1px solid #353c4e; border-radius:8px; margin:6px 0; padding:2px 8px 6px; }
  details summary { cursor:pointer; font-weight:600; padding:5px 0; color:#cdd6e4; user-select:none; }
  .row { display:flex; align-items:center; gap:6px; margin:3px 0; }
  .row label { flex:0 0 96px; color:#aeb6c6; font-size:12px; white-space:nowrap; overflow:hidden; }
  .row input[type=range] { flex:1; min-width:0; accent-color:#4ea1ff; }
  .row .val { flex:0 0 44px; text-align:right; color:#7fd1ff; font-variant-numeric:tabular-nums; font-size:12px; }
  #readout {
    background:#1b2330; border:1px solid #2e3a52; border-radius:8px;
    padding:8px 10px; margin:8px 0; line-height:1.7; font-size:12.5px;
  }
  #readout b { color:#ffd479; font-variant-numeric:tabular-nums; }
  #toast {
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:rgba(20,24,32,.95); color:#cfe6ff; padding:8px 16px; border-radius:8px;
    font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:20;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
    "disfigure": "https://cdn.jsdelivr.net/gh/boytchev/disfigure@main/dist/disfigure.min.js"
  }
}
</script>
</head>
<body>

<div id="panel">
  <h1>X光擺位 3D 模擬器</h1>
  <div class="hint">滑鼠左鍵旋轉視角 / 右鍵平移 / 滾輪縮放。先選場景預設,再微調關節與球管。手指關節未列入滑桿,可由匯入 JSON 設定。</div>

  <select id="presetSel"></select>
  <div class="btnrow">
    <button id="btnShot">📷 截圖 PNG</button>
    <button id="btnBg">⬜ 白底切換</button>
  </div>
  <div class="btnrow">
    <button id="btnExport">⬇ 匯出設定</button>
    <button id="btnImport">⬆ 匯入設定</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>

  <div id="readout"></div>

  <div id="groups"></div>
</div>

<div id="toast"></div>
<div id="status" style="position:fixed;top:50%;left:45%;transform:translate(-50%,-50%);z-index:30;
  background:rgba(24,28,36,.92);color:#e6e9ef;padding:14px 22px;border-radius:10px;font-size:14px;
  max-width:70vw;white-space:pre-wrap;">3D 場景載入中...</div>

<script>
  window.__setStatus = msg => { const el = document.getElementById("status"); if (el) { el.style.display = msg ? "block" : "none"; el.textContent = msg || ""; } };
  window.addEventListener("error", e => window.__setStatus("載入錯誤: " + (e.message || e.type) + "\n" + (e.filename || "")));
  window.addEventListener("unhandledrejection", e => window.__setStatus("載入錯誤 (promise): " + (e.reason && e.reason.message || e.reason)));
</script>

<script type="module">
import * as THREE from "three";
import { RoundedBoxGeometry } from "three/addons/geometries/RoundedBoxGeometry.js";
import { World, Man, scene, camera, renderer, controls, ground } from "disfigure";

/* ============================================================
   World(disfigure 自帶 scene/camera/renderer/controls)
   ============================================================ */
new World();
if (ground) ground.visible = false;
scene.background = new THREE.Color(0xc3ccd5);
scene.add(new THREE.AmbientLight(0xffffff, 0.65));   // disfigure 預設無環境光

function fitViewport() {
  renderer.setSize(window.innerWidth || 1280, window.innerHeight || 720);
  camera.aspect = (window.innerWidth || 1280) / (window.innerHeight || 720);
  camera.updateProjectionMatrix();
}
fitViewport();
setTimeout(fitViewport, 300);

const GL = 0;   // disfigure 原生公尺單位,地面 y=0

const figure = new Man(1.73);
figure.frustumCulled = false;   // GPU 變形不更新 bounds

/* ============================================================
   材質與幾何 helper
   ============================================================ */
const mat = {
  floor:  new THREE.MeshLambertMaterial({ color: 0xa9b5bf }),
  wall:   new THREE.MeshLambertMaterial({ color: 0xd4dbe1 }),
  metal:  new THREE.MeshLambertMaterial({ color: 0x9ba5af }),
  dark:   new THREE.MeshLambertMaterial({ color: 0x3f4854 }),
  panel:  new THREE.MeshLambertMaterial({ color: 0xf2f4f6 }),
  active: new THREE.MeshLambertMaterial({ color: 0xfafcfe }),
  table:  new THREE.MeshLambertMaterial({ color: 0xe6ebef }),
  beam:   new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.13, side: THREE.DoubleSide, depthWrite: false }),
  laser:  new THREE.MeshBasicMaterial({ color: 0xff3d6e }),
  cross:  new THREE.LineBasicMaterial({ color: 0xff8800 })
};

function box(w, h, d, m, x, y, z, parent) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
  mesh.position.set(x, GL + y, z);
  mesh.castShadow = mesh.receiveShadow = true;
  (parent || scene).add(mesh);
  return mesh;
}
function rbox(w, h, d, r, m, x, y, z, parent) {
  const mesh = new THREE.Mesh(new RoundedBoxGeometry(w, h, d, 4, r), m);
  mesh.position.set(x, GL + y, z);
  mesh.castShadow = mesh.receiveShadow = true;
  (parent || scene).add(mesh);
  return mesh;
}

/* ============================================================
   房間
   ============================================================ */
const ROOM = { backZ: -1.9, leftX: -2.2, w: 4.6, d: 4.0, h: 2.9 };
{
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.d), mat.floor);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(ROOM.leftX + ROOM.w / 2, GL + 0.001, ROOM.backZ + ROOM.d / 2);
  floor.receiveShadow = true;
  scene.add(floor);
  const back = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.h), mat.wall);
  back.position.set(ROOM.leftX + ROOM.w / 2, GL + ROOM.h / 2, ROOM.backZ);
  back.receiveShadow = true;
  scene.add(back);
  const left = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.d, ROOM.h), mat.wall);
  left.rotation.y = Math.PI / 2;
  left.position.set(ROOM.leftX, GL + ROOM.h / 2, ROOM.backZ + ROOM.d / 2);
  left.receiveShadow = true;
  scene.add(left);
}

/* ============================================================
   壁架(單柱 + 深色內軌 + 圓角白匣)
   ============================================================ */
const WS = { x: -0.9, faceZ: ROOM.backZ + 0.24 };
{
  rbox(0.30, ROOM.h, 0.13, 0.02, mat.metal, WS.x, ROOM.h / 2, ROOM.backZ + 0.075, scene);
  box(0.10, ROOM.h - 0.04, 0.012, mat.dark, WS.x, ROOM.h / 2, ROOM.backZ + 0.142, scene);
}
const wsCarriage = new THREE.Group();
scene.add(wsCarriage);
{
  rbox(0.15, 0.24, 0.12, 0.02, mat.metal, WS.x, 1.45, ROOM.backZ + 0.165, wsCarriage);
  rbox(0.62, 0.66, 0.09, 0.03, mat.panel, WS.x, 1.45, ROOM.backZ + 0.19, wsCarriage);
  const frame = box(0.50, 0.56, 0.006, new THREE.MeshLambertMaterial({ color: 0xd9dee4 }), WS.x, 1.45, WS.faceZ - 0.004, wsCarriage);
  frame.castShadow = false;
  const act = box(0.35, 0.43, 0.012, mat.active, WS.x, 1.45, WS.faceZ, wsCarriage);
  act.castShadow = false;
  act.receiveShadow = true;
}

/* ============================================================
   定位雷射 + 體表光野十字(視覺等效;WebGPU spot 陰影不可用)
   ============================================================ */
const laserL = box(1, 0.0045, 0.0045, mat.laser, 0, 1.5, WS.faceZ + 0.005, scene);
const laserR = box(1, 0.0045, 0.0045, mat.laser, 0, 1.5, WS.faceZ + 0.005, scene);
const laserSkin = box(1, 0.005, 0.005, mat.laser, 0, 1.5, 0, scene);
for (const m of [laserL, laserR, laserSkin]) m.castShadow = false;
const LASER_X0 = ROOM.leftX + 0.01, LASER_X1 = 0.45;

const crossSkinMat = new THREE.MeshBasicMaterial({ color: 0x6b4a1e, transparent: true, opacity: 0.55 });
const crossSkinH = box(1, 0.006, 0.004, crossSkinMat, 0, 0, 0, scene);
const crossSkinV = box(0.006, 1, 0.004, crossSkinMat, 0, 0, 0, scene);
for (const m of [crossSkinH, crossSkinV]) { m.castShadow = false; m.visible = false; }

/* ============================================================
   攝影檯 + 檯面偵檢板
   ============================================================ */
const TBL = { cx: 0.75, cz: 0.55, topY: 0.74, w: 2.2, d: 0.8 };
rbox(1.35, TBL.topY - 0.10, 0.60, 0.02, mat.metal, TBL.cx, (TBL.topY - 0.10) / 2 + 0.01, TBL.cz);
rbox(TBL.w, 0.07, TBL.d, 0.025, mat.table, TBL.cx, TBL.topY - 0.035, TBL.cz);
const tblDet = new THREE.Group();
scene.add(tblDet);
{
  rbox(0.46, 0.018, 0.38, 0.006, mat.dark, 0, TBL.topY + 0.009, 0, tblDet);
  const a = box(0.43, 0.004, 0.35, mat.active, 0, TBL.topY + 0.019, 0, tblDet);
  a.receiveShadow = true;
}

/* ============================================================
   球管(膠囊殼 + 圓角準直儀 + 把手 + C 形把手 + 控制鈕)
   ============================================================ */
const tubeRig = new THREE.Group();
scene.add(tubeRig);
const column = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 1, 16), mat.metal);
column.castShadow = true;
tubeRig.add(column);
const ceilPlate = new THREE.Mesh(new RoundedBoxGeometry(0.34, 0.05, 0.34, 4, 0.012), mat.metal);
ceilPlate.position.y = GL + ROOM.h - 0.07;
tubeRig.add(ceilPlate);
const yoke = new THREE.Mesh(new RoundedBoxGeometry(0.10, 0.09, 0.12, 4, 0.02), mat.metal);
yoke.castShadow = true;
tubeRig.add(yoke);

const tubeHead = new THREE.Group();
tubeRig.add(tubeHead);
{
  const housing = new THREE.Mesh(new THREE.CapsuleGeometry(0.105, 0.30, 8, 24), mat.panel);
  housing.rotation.z = Math.PI / 2;
  housing.castShadow = true;
  tubeHead.add(housing);
  const colli = new THREE.Mesh(new RoundedBoxGeometry(0.20, 0.17, 0.20, 4, 0.02), mat.panel);
  colli.position.y = -0.175;
  colli.castShadow = true;
  tubeHead.add(colli);
  const aper = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.012, 0.10), mat.dark);
  aper.position.y = -0.262;
  tubeHead.add(aper);
  for (const sx of [-1, 1]) {
    const grip = new THREE.Mesh(new THREE.CapsuleGeometry(0.014, 0.16, 4, 10), mat.panel);
    grip.rotation.x = Math.PI / 2;
    grip.position.set(sx * 0.135, -0.175, 0);
    grip.castShadow = true;
    tubeHead.add(grip);
    for (const sz of [-1, 1]) {
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.010, 0.010, 0.05, 8), mat.panel);
      post.rotation.z = Math.PI / 2;
      post.position.set(sx * 0.115, -0.175, sz * 0.06);
      tubeHead.add(post);
    }
  }
  const cHandle = new THREE.Mesh(new THREE.TorusGeometry(0.165, 0.024, 12, 32, Math.PI), mat.panel);
  cHandle.position.y = 0.05;
  cHandle.castShadow = true;
  tubeHead.add(cHandle);
  const btnMat = new THREE.MeshLambertMaterial({ color: 0x8fa3c8 });
  for (const sx of [-0.085, 0.085]) {
    for (const i of [-1, 0, 1]) {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.017, 0.017, 0.014, 14), btnMat);
      btn.position.set(sx, 0.105, i * 0.052);
      tubeHead.add(btn);
    }
  }
}

const beamGroup = new THREE.Group();
beamGroup.position.y = -0.27;
tubeHead.add(beamGroup);
const beamMesh = new THREE.Mesh(new THREE.BufferGeometry(), mat.beam);
beamGroup.add(beamMesh);
const crossLines = new THREE.LineSegments(new THREE.BufferGeometry(), mat.cross);
beamGroup.add(crossLines);
const spot = new THREE.SpotLight(0xfff0c8, 120, 0, 0.3, 0.22, 1.1);
spot.position.set(0, 0, 0);   // SpotLight 預設 position=(0,1,0),不歸零會高 1m(光池變大變淡)
spot.castShadow = true;
spot.shadow.mapSize.set(2048, 2048);
spot.shadow.bias = -0.0005;
beamGroup.add(spot);
const spotTarget = new THREE.Object3D();
beamGroup.add(spotTarget);
spot.target = spotTarget;

function rebuildBeam(fieldW, fieldH, len) {
  const a = 0.02, W = fieldW / 2, H = fieldH / 2, L = len;
  const v = [
    [-a, 0, -a], [a, 0, -a], [a, 0, a], [-a, 0, a],
    [-W, -L, -H], [W, -L, -H], [W, -L, H], [-W, -L, H]
  ];
  const idx = [0,4,5, 0,5,1,  1,5,6, 1,6,2,  2,6,7, 2,7,3,  3,7,4, 3,4,0,  4,6,5, 4,7,6];
  const pos = new Float32Array(idx.length * 3);
  idx.forEach((vi, i) => { pos[i*3] = v[vi][0]; pos[i*3+1] = v[vi][1]; pos[i*3+2] = v[vi][2]; });
  beamMesh.geometry.dispose();
  beamMesh.geometry = new THREE.BufferGeometry();
  beamMesh.geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const y = -L + 0.01;
  const cp = new Float32Array([ -W, y, 0,  W, y, 0,   0, y, -H,  0, y, H ]);
  crossLines.geometry.dispose();
  crossLines.geometry = new THREE.BufferGeometry();
  crossLines.geometry.setAttribute("position", new THREE.BufferAttribute(cp, 3));
  spot.angle = Math.min(1.2, Math.atan(Math.max(W, H) / L) * 1.15 + 0.02);
  spotTarget.position.set(0, -L, 0);
}

/* ============================================================
   狀態
   ============================================================ */
const S = {
  fig:  { x: -0.9, z: -1.40, y: 0, rotY: 90, rotZ: 0 },
  tube: { x: -0.9, z: 0.14, h: 1.50, pitch: 90, yaw: 0, fieldW: 0.24, fieldH: 0.30, beamOn: 1 },
  ws:   { h: 1.50 },
  det:  { x: 1.38, z: 0.55, on: 0 },
  laser: { gapFrom: 0, gapTo: 0, skin: null },
  cross: null
};

/* ============================================================
   關節(disfigure:joint.x/y/z 度數;手指由 JSON 匯入設定)
   ============================================================ */
const JOINT_DEFS = {
  "頭頸": [
    ["head.x", "點頭(+前彎)", -50, 60], ["head.y", "轉頭", -90, 90], ["head.z", "側傾", -45, 45]
  ],
  "軀幹": [
    ["chest.x", "胸彎", -40, 60], ["chest.y", "胸旋", -60, 60], ["chest.z", "胸側傾", -40, 40],
    ["waist.x", "腰彎", -40, 90], ["waist.y", "腰旋", -60, 60], ["waist.z", "腰側傾", -40, 40]
  ],
  "左臂": [
    ["l_arm.z", "垂放/外展", -180, 90], ["l_arm.x", "前後擺", -90, 90], ["l_arm.y", "旋轉", -90, 90],
    ["l_elbow.x", "屈肘 X", -10, 150], ["l_elbow.y", "屈肘 Y", -150, 150],
    ["l_wrist.x", "屈腕", -80, 80], ["l_wrist.z", "腕偏", -45, 45]
  ],
  "右臂": [
    ["r_arm.z", "垂放/外展", -180, 90], ["r_arm.x", "前後擺", -90, 90], ["r_arm.y", "旋轉", -90, 90],
    ["r_elbow.x", "屈肘 X", -10, 150], ["r_elbow.y", "屈肘 Y", -150, 150],
    ["r_wrist.x", "屈腕", -80, 80], ["r_wrist.z", "腕偏", -45, 45]
  ],
  "左腿": [
    ["l_leg.x", "屈髖", -30, 120], ["l_leg.y", "旋轉", -45, 45], ["l_leg.z", "外展", -30, 60],
    ["l_knee.x", "屈膝", 0, 150], ["l_ankle.x", "踝屈伸", -50, 50], ["l_ankle.z", "踝內外翻", -40, 40], ["l_foot.x", "前足", -40, 40]
  ],
  "右腿": [
    ["r_leg.x", "屈髖", -30, 120], ["r_leg.y", "旋轉", -45, 45], ["r_leg.z", "外展", -30, 60],
    ["r_knee.x", "屈膝", 0, 150], ["r_ankle.x", "踝屈伸", -50, 50], ["r_ankle.z", "踝內外翻", -40, 40], ["r_foot.x", "前足", -40, 40]
  ]
};

// 手指 path(匯出/匯入 JSON 用)
const FINGER_PATHS = [];
for (const side of ["l", "r"]) {
  FINGER_PATHS.push(`${side}_thumb.x`, `${side}_thumb_tip.x`);
  for (const f of ["index", "middle", "ring", "pinky"]) {
    FINGER_PATHS.push(`${side}_${f}.x`, `${side}_${f}_mid.x`, `${side}_${f}_tip.x`);
  }
}

function setJoint(path, v) {
  const [part, axis] = path.split(".");
  if (figure[part]) figure[part][axis] = v;
}
function getJoint(path) {
  const [part, axis] = path.split(".");
  return figure[part] ? figure[part][axis] : 0;
}
const ALL_PATHS = Object.values(JOINT_DEFS).flat().map(d => d[0]).concat(FINGER_PATHS);
function resetPose() { for (const p of ALL_PATHS) setJoint(p, 0); }

/* ============================================================
   套用狀態
   ============================================================ */
function applyAll() {
  figure.position.set(S.fig.x, GL + S.fig.y, S.fig.z);
  // 旋轉必須下在 figure 本體(parent Group 會被變形 shader 忽略);大角度根旋轉會翻轉部分關節軸語意(HANDOVER)
  figure.rotation.set(0, THREE.MathUtils.degToRad(S.fig.rotY), THREE.MathUtils.degToRad(S.fig.rotZ || 0));

  wsCarriage.position.y = S.ws.h - 1.45;
  tblDet.visible = !!S.det.on;
  tblDet.position.set(S.det.x, 0, S.det.z);

  tubeRig.position.set(S.tube.x, 0, S.tube.z);
  tubeRig.rotation.y = THREE.MathUtils.degToRad(S.tube.yaw);
  tubeHead.position.y = GL + S.tube.h;
  tubeHead.rotation.x = THREE.MathUtils.degToRad(S.tube.pitch);
  yoke.position.y = GL + S.tube.h + 0.135;
  const colLen = ROOM.h - 0.1 - S.tube.h;
  column.scale.y = colLen;
  column.position.y = GL + S.tube.h + colLen / 2;

  // SID:焦點(tubeHead)至壁架板 / 檯面偵檢板 / 檯面
  const focal = new THREE.Vector3();
  tubeHead.getWorldPosition(focal);
  const q = new THREE.Quaternion();
  beamGroup.getWorldQuaternion(q);
  const dir = new THREE.Vector3(0, -1, 0).applyQuaternion(q);
  let L = 1.2, sidTxt = "-";
  const cands = [];
  if (Math.abs(dir.z) > 0.05) {
    const t = (WS.faceZ - focal.z) / dir.z;
    if (t > 0.3) cands.push({ t, what: "壁架板" });
  }
  if (Math.abs(dir.y) > 0.05) {
    const planeY = GL + (S.det.on ? TBL.topY + 0.02 : TBL.topY);
    const t = (planeY - focal.y) / dir.y;
    if (t > 0.3) cands.push({ t, what: S.det.on ? "檯面偵檢板" : "檯面" });
  }
  if (cands.length) {
    const hit = cands.reduce((a, b) => (a.t < b.t ? a : b));
    const sid = hit.t;
    L = Math.max(0.1, sid - 0.27);
    sidTxt = `${Math.round(sid * 100)} cm(至${hit.what})`;
  }
  beamGroup.visible = !!S.tube.beamOn;
  if (S.tube.beamOn) rebuildBeam(S.tube.fieldW, S.tube.fieldH, L);

  // 定位雷射(高度 = 壁架板心)
  {
    const ly = GL + S.ws.h;
    const gF = S.laser.gapFrom, gT = S.laser.gapTo;
    const hasGap = gT > gF;
    const lEnd = hasGap ? gF : LASER_X1;
    laserL.scale.x = Math.max(0.001, lEnd - LASER_X0);
    laserL.position.set((LASER_X0 + lEnd) / 2, ly, WS.faceZ + 0.005);
    laserR.visible = hasGap;
    if (hasGap) {
      laserR.scale.x = Math.max(0.001, LASER_X1 - gT);
      laserR.position.set((gT + LASER_X1) / 2, ly, WS.faceZ + 0.005);
    }
    const sk = S.laser.skin;
    laserSkin.visible = !!sk;
    if (sk) {
      laserSkin.scale.x = sk.len;
      laserSkin.position.set(sk.x, ly, sk.z);
    }
  }
  // 體表光野十字({x,y,z,lenH,lenV,flat}:flat=橫躺面(如仰臥腹部),V 臂轉去 z 方向)
  {
    const c = S.cross;
    crossSkinH.visible = crossSkinV.visible = !!c;
    if (c) {
      crossSkinH.scale.x = c.lenH;
      crossSkinH.position.set(c.x, GL + c.y, c.z);
      crossSkinV.rotation.x = c.flat ? Math.PI / 2 : 0;
      crossSkinV.scale.y = c.lenV;
      crossSkinV.position.set(c.x, GL + c.y, c.z);
    }
  }

  if (figure.update) figure.update();

  document.getElementById("readout").innerHTML =
    `SID:<b>${sidTxt}</b><br>` +
    `球管:高 <b>${(S.tube.h).toFixed(2)} m</b>,俯仰 <b>${S.tube.pitch}&deg;</b>,旋轉 <b>${S.tube.yaw}&deg;</b><br>` +
    `光野:<b>${Math.round(S.tube.fieldW * 100)} x ${Math.round(S.tube.fieldH * 100)} cm</b>`;
}

function applyPreset(key) {
  const p = PRESETS[key];
  if (!p) return;
  Object.assign(S.fig, p.fig);
  Object.assign(S.tube, p.tube);
  Object.assign(S.ws, p.ws);
  Object.assign(S.det, p.det);
  S.laser = p.laser ? JSON.parse(JSON.stringify(p.laser)) : { gapFrom: 0, gapTo: 0, skin: null };
  S.cross = p.cross ? JSON.parse(JSON.stringify(p.cross)) : null;
  resetPose();
  for (const [path, v] of Object.entries(p.joints || {})) setJoint(path, v);
  applyAll();
  syncSliders();
  if (p.cam) {
    camera.position.set(p.cam.px, GL + p.cam.py, p.cam.pz);
    controls.target.set(p.cam.tx, GL + p.cam.ty, p.cam.tz);
    controls.update();
  }
}

/* ============================================================
   UI
   ============================================================ */
const groupsDiv = document.getElementById("groups");
const sliderRegistry = [];

function addSlider(parent, label, min, max, step, get, set) {
  const row = document.createElement("div");
  row.className = "row";
  const lab = document.createElement("label");
  lab.textContent = label;
  lab.title = label;
  const input = document.createElement("input");
  input.type = "range"; input.min = min; input.max = max; input.step = step;
  input.value = get();
  const val = document.createElement("span");
  val.className = "val"; val.textContent = (+get()).toFixed(step < 1 ? 2 : 0);
  input.addEventListener("input", () => {
    const v = +input.value;
    set(v);
    val.textContent = v.toFixed(step < 1 ? 2 : 0);
    applyAll();
  });
  row.append(lab, input, val);
  parent.appendChild(row);
  sliderRegistry.push({ get, input, val, step });
}

function addGroup(title, open) {
  const det = document.createElement("details");
  if (open) det.open = true;
  const sum = document.createElement("summary");
  sum.textContent = title;
  det.appendChild(sum);
  groupsDiv.appendChild(det);
  return det;
}

function syncSliders() {
  for (const s of sliderRegistry) {
    const v = +s.get();
    s.input.value = v;
    s.val.textContent = v.toFixed(s.step < 1 ? 2 : 0);
  }
}

{
  const g = addGroup("人物位置與朝向", true);
  addSlider(g, "位置 X (m)", -2.2, 2.4, 0.01, () => S.fig.x, v => S.fig.x = v);
  addSlider(g, "位置 Z (m)", -1.9, 2.1, 0.01, () => S.fig.z, v => S.fig.z = v);
  addSlider(g, "升降 Y (m)", -0.3, 1.2, 0.01, () => S.fig.y, v => S.fig.y = v);

  addSlider(g, "整體放倒", -180, 180, 1, () => S.fig.rotZ, v => S.fig.rotZ = v);
}

for (const [title, defs] of Object.entries(JOINT_DEFS)) {

}

{

/* ============================================================
   Preset 下拉 + 按鈕
   ============================================================ */
const presetSel = document.getElementById("presetSel");
for (const [k, p] of Object.entries(PRESETS)) {
  const opt = document.createElement("option");
  opt.value = k; opt.textContent = p.label;
  presetSel.appendChild(opt);
}
presetSel.addEventListener("change", () => applyPreset(presetSel.value));

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 1800);
}

async function renderOnce() {
  if (renderer.renderAsync) await renderer.renderAsync(scene, camera);
  else renderer.render(scene, camera);
}

document.getElementById("btnShot").addEventListener("click", async () => {
  await renderOnce();
  renderer.domElement.toBlob(b => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `${presetSel.value}_3d.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
  toast("已下載截圖");
});

let whiteBg = false;
document.getElementById("btnBg").addEventListener("click", () => {
  whiteBg = !whiteBg;
  scene.background = new THREE.Color(whiteBg ? 0xffffff : 0xc3ccd5);
});

document.getElementById("btnExport").addEventListener("click", () => {
  const joints = {};
  for (const p of ALL_PATHS) joints[p] = getJoint(p);
  const data = { preset: presetSel.value, S, joints };
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
  a.download = `${presetSel.value}_settings.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已匯出設定 JSON");
});

document.getElementById("btnImport").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  f.text().then(txt => {
    try {
      const data = JSON.parse(txt);
      if (data.S) {
        Object.assign(S.fig, data.S.fig); Object.assign(S.tube, data.S.tube);
        Object.assign(S.ws, data.S.ws); Object.assign(S.det, data.S.det);
        if (data.S.laser) S.laser = data.S.laser;
        S.cross = data.S.cross || null;
      }
      if (data.joints) for (const [p, v] of Object.entries(data.joints)) setJoint(p, v);
      applyAll(); syncSliders();
      toast("已匯入設定");
    } catch (err) { toast("匯入失敗:" + err.message); }
  });
  e.target.value = "";
});

/* ============================================================
   啟動
   ============================================================ */
applyPreset("cspine-lateral");
presetSel.value = "cspine-lateral";
window.__setStatus("");

window.__sim = { THREE, S, PRESETS, figure, scene, camera, renderer, controls, applyAll, applyPreset, setJoint, getJoint, resetPose, syncSliders, renderOnce };
